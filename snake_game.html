<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐍 Neon Snake – Play Now!</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #050510;
      --panel: #0d0d2b;
      --neon1: #00ffcc;
      --neon2: #ff00aa;
      --neon3: #ffcc00;
      --neon4: #00aaff;
      --glow1: 0 0 10px #00ffcc, 0 0 30px #00ffcc88, 0 0 60px #00ffcc44;
      --glow2: 0 0 10px #ff00aa, 0 0 30px #ff00aa88;
      --glow3: 0 0 10px #ffcc00, 0 0 30px #ffcc0088;
      --font-display: 'Orbitron', monospace;
      --font-body: 'Exo 2', sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    body::before {
      content:'';
      position:fixed; inset:0;
      background-image:
        radial-gradient(1px 1px at 10% 20%,#fff6,transparent),
        radial-gradient(1px 1px at 30% 60%,#fff4,transparent),
        radial-gradient(1px 1px at 70% 15%,#fff5,transparent),
        radial-gradient(1px 1px at 85% 70%,#fff3,transparent),
        radial-gradient(1px 1px at 50% 90%,#fff4,transparent),
        radial-gradient(2px 2px at 60% 40%,#fff3,transparent),
        radial-gradient(1px 1px at 90% 30%,#fff5,transparent);
      pointer-events:none;
      animation:twinkle 5s infinite alternate;
    }
    @keyframes twinkle { 0%{opacity:.5} 100%{opacity:1} }
    body::after {
      content:''; position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(0,255,204,.03) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,255,204,.03) 1px,transparent 1px);
      background-size:40px 40px;
      pointer-events:none;
    }
    h1 {
      font-family:var(--font-display);
      font-size:clamp(1.6rem,4vw,2.8rem);
      font-weight:900;
      letter-spacing:.15em;
      color:var(--neon1);
      text-shadow:var(--glow1);
      margin-bottom:6px;
      text-align:center;
      animation:pulse-title 2.5s infinite alternate;
    }
    @keyframes pulse-title {
      from{text-shadow:0 0 8px #00ffcc,0 0 20px #00ffcc66}
      to  {text-shadow:0 0 16px #00ffcc,0 0 50px #00ffccaa,0 0 80px #00ffcc44}
    }
    .subtitle {
      font-size:.85rem; color:#ffffff55;
      letter-spacing:.25em; text-transform:uppercase; margin-bottom:18px;
    }
    .game-wrapper {
      display:flex; gap:20px; align-items:flex-start;
      flex-wrap:wrap; justify-content:center;
      position:relative; z-index:10;
    }
    .side-panel { display:flex; flex-direction:column; gap:14px; min-width:140px; }
    .score-box {
      background:var(--panel); border:1px solid var(--neon1); border-radius:12px;
      padding:14px 18px; text-align:center;
      box-shadow:0 0 15px #00ffcc22,inset 0 0 15px #00ffcc08;
    }
    .score-box .label {
      font-family:var(--font-display); font-size:.6rem; color:var(--neon1);
      letter-spacing:.2em; text-transform:uppercase; margin-bottom:6px;
    }
    .score-box .value {
      font-family:var(--font-display); font-size:2rem; font-weight:900;
      color:#fff; text-shadow:var(--glow1); line-height:1;
    }
    .hi-score-box { border-color:var(--neon3); box-shadow:0 0 15px #ffcc0022,inset 0 0 15px #ffcc0008; }
    .hi-score-box .label { color:var(--neon3); }
    .hi-score-box .value { text-shadow:var(--glow3); }
    .level-box { border-color:var(--neon2); box-shadow:0 0 15px #ff00aa22,inset 0 0 15px #ff00aa08; }
    .level-box .label { color:var(--neon2); }
    .level-box .value { text-shadow:var(--glow2); }
    .controls-box {
      background:var(--panel); border:1px solid #ffffff18; border-radius:12px; padding:14px;
    }
    .controls-box .label {
      font-family:var(--font-display); font-size:.55rem; color:#ffffff44;
      letter-spacing:.2em; text-transform:uppercase; margin-bottom:10px;
    }
    .key-row  { display:flex; flex-direction:column; align-items:center; gap:3px; margin-bottom:4px; }
    .key-row-h{ display:flex; gap:3px; justify-content:center; }
    .key {
      background:#1a1a3a; border:1px solid #ffffff25; border-radius:5px;
      width:30px; height:28px; display:flex; align-items:center; justify-content:center;
      font-family:var(--font-display); font-size:.6rem; color:#ffffff88;
    }
    .canvas-container {
      position:relative; border-radius:16px; overflow:hidden;
      box-shadow:0 0 0 2px var(--neon1),0 0 30px #00ffcc55,0 0 80px #00ffcc22;
      animation:border-pulse 3s infinite alternate;
    }
    @keyframes border-pulse {
      from{box-shadow:0 0 0 2px #00ffcc,0 0 30px #00ffcc55,0 0 80px #00ffcc22}
      to  {box-shadow:0 0 0 2px #ff00aa,0 0 30px #ff00aa55,0 0 80px #ff00aa22}
    }
    canvas { display:block; background:#020210; }
    .overlay {
      position:absolute; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:rgba(2,2,16,.92); z-index:20; gap:14px; backdrop-filter:blur(4px);
    }
    .overlay.hidden { display:none; }
    .overlay h2 {
      font-family:var(--font-display); font-size:clamp(1.4rem,3vw,2rem);
      color:var(--neon1); text-shadow:var(--glow1); text-align:center; letter-spacing:.1em;
    }
    .overlay .game-over-text { color:var(--neon2); text-shadow:var(--glow2); }
    .overlay p { font-family:var(--font-body); color:#ffffffaa; font-size:.9rem; text-align:center; max-width:260px; }
    .final-score { font-family:var(--font-display); font-size:3rem; font-weight:900; color:#fff; text-shadow:var(--glow3); }
    .btn {
      font-family:var(--font-display); font-size:.8rem; letter-spacing:.2em; text-transform:uppercase;
      border:none; border-radius:8px; padding:12px 28px; cursor:pointer; transition:all .2s;
    }
    .btn-primary {
      background:linear-gradient(135deg,#00ffcc22,#00ffcc44); color:var(--neon1);
      border:1px solid var(--neon1); box-shadow:var(--glow1);
    }
    .btn-primary:hover { background:linear-gradient(135deg,#00ffcc44,#00ffcc66); box-shadow:0 0 20px #00ffcc,0 0 50px #00ffcc55; transform:scale(1.05); }
    .btn-secondary {
      background:linear-gradient(135deg,#ff00aa11,#ff00aa33); color:var(--neon2); border:1px solid var(--neon2);
    }
    .btn-secondary:hover { background:linear-gradient(135deg,#ff00aa33,#ff00aa55); box-shadow:var(--glow2); transform:scale(1.05); }
    .speed-select { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
    .speed-btn {
      font-family:var(--font-display); font-size:.6rem; letter-spacing:.15em;
      padding:7px 14px; border-radius:6px; cursor:pointer; border:1px solid #ffffff22;
      background:#1a1a3a; color:#ffffff66; transition:all .2s;
    }
    .speed-btn.active { border-color:var(--neon1); color:var(--neon1); box-shadow:0 0 10px #00ffcc55; }
    .speed-btn:hover { color:#fff; }
    .touch-controls { display:none; margin-top:14px; flex-direction:column; align-items:center; gap:5px; }
    .touch-row { display:flex; gap:5px; }
    .touch-btn {
      width:60px; height:55px; background:#0d0d2b; border:1px solid var(--neon1);
      border-radius:10px; color:var(--neon1); font-size:1.3rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 0 8px #00ffcc33; transition:all .1s;
      -webkit-tap-highlight-color:transparent; user-select:none;
    }
    .touch-btn:active { background:#00ffcc22; box-shadow:0 0 18px #00ffcc99; transform:scale(.95); }
    @media(max-width:600px){ .side-panel{display:none;} .touch-controls{display:flex;} }
    #particles { position:fixed; inset:0; pointer-events:none; z-index:1; }
    .level-flash {
      position:absolute; inset:0;
      background:radial-gradient(circle,#ffcc0033,transparent 70%);
      pointer-events:none; opacity:0; z-index:15;
    }
    @keyframes flash-anim { 0%{opacity:1} 100%{opacity:0} }
    .length-bar-wrap { background:var(--panel); border:1px solid #ffffff18; border-radius:8px; padding:10px 14px; }
    .length-bar-label { font-family:var(--font-display); font-size:.55rem; color:#ffffff44; letter-spacing:.2em; text-transform:uppercase; margin-bottom:6px; }
    .length-bar-bg { height:8px; background:#1a1a3a; border-radius:4px; overflow:hidden; }
    .length-bar-fill { height:100%; background:linear-gradient(90deg,var(--neon1),var(--neon2)); border-radius:4px; transition:width .3s; box-shadow:0 0 8px #00ffcc88; width:10%; }
  </style>
</head>
<body>

<canvas id="particles"></canvas>

<h1>🐍 NEON SNAKE</h1>
<p class="subtitle">Arcade Edition · Navigate · Grow · Survive</p>

<div class="game-wrapper">
  <div class="side-panel">
    <div class="score-box">
      <div class="label">Score</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="score-box hi-score-box">
      <div class="label">Best</div>
      <div class="value" id="hi-score">0</div>
    </div>
    <div class="score-box level-box">
      <div class="label">Level</div>
      <div class="value" id="level">1</div>
    </div>
    <div class="length-bar-wrap">
      <div class="length-bar-label">Length</div>
      <div class="length-bar-bg"><div class="length-bar-fill" id="len-bar"></div></div>
    </div>
    <div class="controls-box">
      <div class="label">Controls</div>
      <div class="key-row"><div class="key">▲</div></div>
      <div class="key-row-h">
        <div class="key">◀</div><div class="key">▼</div><div class="key">▶</div>
      </div>
      <br/>
      <div style="color:#ffffff44;font-size:.65rem;text-align:center">WASD also works</div>
    </div>
  </div>

  <div>
    <div class="canvas-container">
      <canvas id="game" width="420" height="420"></canvas>

      <div class="overlay" id="start-overlay">
        <h2>🐍 NEON SNAKE</h2>
        <p>Eat the glowing orbs. Grow longer.<br/>Don't hit yourself or the walls!</p>
        <div class="speed-select">
          <button class="speed-btn active" data-speed="slow">🐢 Slow</button>
          <button class="speed-btn" data-speed="normal">⚡ Normal</button>
          <button class="speed-btn" data-speed="fast">🔥 Fast</button>
        </div>
        <button class="btn btn-primary" id="start-btn">▶ START GAME</button>
      </div>

      <div class="overlay hidden" id="gameover-overlay">
        <h2 class="game-over-text">GAME OVER</h2>
        <div class="final-score" id="final-score">0</div>
        <p id="go-msg">Nice try! Keep playing!</p>
        <button class="btn btn-primary" id="restart-btn">↺ PLAY AGAIN</button>
        <button class="btn btn-secondary" id="menu-btn">☰ MENU</button>
      </div>

      <div class="level-flash" id="lvl-flash"></div>
    </div>

    <div class="touch-controls">
      <div class="touch-row"><button class="touch-btn" id="t-up">▲</button></div>
      <div class="touch-row">
        <button class="touch-btn" id="t-left">◀</button>
        <button class="touch-btn" id="t-down">▼</button>
        <button class="touch-btn" id="t-right">▶</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── PARTICLE BACKGROUND ──
(function(){
  const pc=document.getElementById('particles'),pctx=pc.getContext('2d');
  let W,H,pts=[];
  function resize(){W=pc.width=window.innerWidth;H=pc.height=window.innerHeight;}
  function mkP(){return{x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,alpha:Math.random()*.5+.1,color:['#00ffcc','#ff00aa','#00aaff','#ffcc00'][Math.floor(Math.random()*4)]};}
  function init(){pts=Array.from({length:80},mkP);}
  function anim(){
    pctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      pctx.save();pctx.globalAlpha=p.alpha;pctx.shadowBlur=6;pctx.shadowColor=p.color;
      pctx.fillStyle=p.color;pctx.beginPath();pctx.arc(p.x,p.y,p.r,0,Math.PI*2);pctx.fill();pctx.restore();
    });
    requestAnimationFrame(anim);
  }
  resize();init();anim();
  window.addEventListener('resize',resize);
})();

// ── SNAKE GAME ──
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const COLS=21,ROWS=21,CELL=canvas.width/COLS;
const SPEEDS={slow:165,normal:110,fast:75};
let chosenSpeed='slow';
let snake,dir,nextDir,food,bonusFood,score,hiScore=parseInt(localStorage.getItem('snakeHi')||'0'),level,gameLoop,running=false;

const PALETTES=[
  ['#00ffcc','#00ddaa','#00bb88'],
  ['#ff55aa','#dd3388','#bb1166'],
  ['#55aaff','#3388dd','#1166bb'],
  ['#ffcc00','#ddaa00','#bb8800'],
  ['#aa55ff','#8833dd','#6611bb'],
];
let palette=PALETTES[0],paletteIdx=0;
const FOOD_COLORS=['#ff4466','#ff9900','#ffee00','#00ff88','#00ccff','#cc44ff'];
let foodColorIdx=0;
let eatParticles=[];

document.getElementById('hi-score').textContent=hiScore;

function rnd(n){return Math.floor(Math.random()*n);}
function emptyCell(){
  let pos;
  const occ=new Set(snake.body.map(s=>`${s.x},${s.y}`));
  do{pos={x:rnd(COLS),y:rnd(ROWS)};}while(occ.has(`${pos.x},${pos.y}`));
  return pos;
}

function init(){
  const cx=Math.floor(COLS/2),cy=Math.floor(ROWS/2);
  snake={body:[{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}],grow:0};
  dir={x:1,y:0};nextDir={x:1,y:0};
  score=0;level=1;paletteIdx=0;palette=PALETTES[0];
  eatParticles=[];bonusFood=null;
  spawnFood();updateUI();
}

function spawnFood(){
  food=emptyCell();
  food.color=FOOD_COLORS[foodColorIdx%FOOD_COLORS.length];
  food.pulse=0;foodColorIdx++;
}

function spawnBonus(){
  if(!bonusFood){bonusFood=emptyCell();bonusFood.timer=140;bonusFood.color='#ffcc00';}
}

function step(){
  dir=nextDir;
  const head={x:snake.body[0].x+dir.x,y:snake.body[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS){endGame();return;}
  if(snake.body.some(s=>s.x===head.x&&s.y===head.y)){endGame();return;}
  snake.body.unshift(head);

  if(head.x===food.x&&head.y===food.y){
    score+=10*level;
    snake.grow+=3;
    spawnEatParticles(head.x*CELL+CELL/2,head.y*CELL+CELL/2,food.color);
    spawnFood();checkLevel();
    if(score>0&&score%80===0)spawnBonus();
    updateUI();
  }
  if(bonusFood&&head.x===bonusFood.x&&head.y===bonusFood.y){
    score+=50*level;
    spawnEatParticles(head.x*CELL+CELL/2,head.y*CELL+CELL/2,'#ffcc00');
    bonusFood=null;updateUI();
  }
  if(snake.grow>0)snake.grow--;else snake.body.pop();
  if(bonusFood){bonusFood.timer--;if(bonusFood.timer<=0)bonusFood=null;}
  food.pulse=(food.pulse||0)+0.12;
  draw();updateLenBar();
}

function checkLevel(){
  const nl=Math.floor(score/100)+1;
  if(nl>level){
    level=nl;
    paletteIdx=(paletteIdx+1)%PALETTES.length;
    palette=PALETTES[paletteIdx];
    showLevelFlash();
    clearInterval(gameLoop);
    const speed=Math.max(55,SPEEDS[chosenSpeed]-(level-1)*7);
    gameLoop=setInterval(step,speed);
  }
}

function lighten(hex,amt){
  const n=parseInt(hex.slice(1),16);
  return `rgb(${Math.min((n>>16)+Math.round(255*amt),255)},${Math.min(((n>>8)&0xff)+Math.round(255*amt),255)},${Math.min((n&0xff)+Math.round(255*amt),255)})`;
}

function roundRect(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}

function drawOrb(cx,cy,r,color,glow,sym){
  if(glow){ctx.shadowBlur=22;ctx.shadowColor=color;}
  const g=ctx.createRadialGradient(cx-r*.3,cy-r*.3,r*.1,cx,cy,r);
  g.addColorStop(0,lighten(color,.55));g.addColorStop(1,color);
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  if(sym){ctx.fillStyle='#000';ctx.font=`bold ${r}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(sym,cx,cy);}
}

function draw(){
  ctx.fillStyle='#020210';ctx.fillRect(0,0,canvas.width,canvas.height);
  // Grid
  ctx.strokeStyle='rgba(0,255,204,.04)';ctx.lineWidth=.5;
  for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,canvas.height);ctx.stroke();}
  for(let j=0;j<=ROWS;j++){ctx.beginPath();ctx.moveTo(0,j*CELL);ctx.lineTo(canvas.width,j*CELL);ctx.stroke();}
  // Food
  const ps=Math.sin(food.pulse)*3;
  drawOrb(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL/2-2+ps,food.color,true);
  // Bonus
  if(bonusFood){
    const bp=Math.sin(Date.now()*.01)*3,ba=Math.min(1,bonusFood.timer/20);
    ctx.globalAlpha=ba;
    drawOrb(bonusFood.x*CELL+CELL/2,bonusFood.y*CELL+CELL/2,CELL/2-1+bp,'#ffcc00',true,'★');
    ctx.globalAlpha=1;
  }
  // Snake
  snake.body.forEach((seg,i)=>{
    const isHead=i===0,isTail=i===snake.body.length-1;
    const ratio=i/snake.body.length;
    const color=i<3?palette[0]:ratio<.5?palette[1]:palette[2];
    const x=seg.x*CELL,y=seg.y*CELL;
    const pad=isHead?1:isTail?3:2;
    const r=isHead?5:4;
    ctx.shadowBlur=isHead?22:8;ctx.shadowColor=isHead?palette[0]:color;
    ctx.fillStyle=color;
    roundRect(ctx,x+pad,y+pad,CELL-pad*2,CELL-pad*2,r);ctx.fill();
    if(isHead){
      ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,.3)';
      roundRect(ctx,x+pad+2,y+pad+2,(CELL-pad*2)*.5,(CELL-pad*2)*.35,3);ctx.fill();
      const es=2.5;ctx.fillStyle='#fff';ctx.shadowBlur=0;
      let e1x,e1y,e2x,e2y;
      if(dir.x===1){e1x=x+CELL-5;e1y=y+5;e2x=x+CELL-5;e2y=y+CELL-7;}
      else if(dir.x===-1){e1x=x+5;e1y=y+5;e2x=x+5;e2y=y+CELL-7;}
      else if(dir.y===-1){e1x=x+5;e1y=y+5;e2x=x+CELL-7;e2y=y+5;}
      else{e1x=x+5;e1y=y+CELL-5;e2x=x+CELL-7;e2y=y+CELL-5;}
      ctx.beginPath();ctx.arc(e1x,e1y,es,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(e2x,e2y,es,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#111';
      ctx.beginPath();ctx.arc(e1x,e1y,es*.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(e2x,e2y,es*.5,0,Math.PI*2);ctx.fill();
    }
    ctx.shadowBlur=0;
  });
  // Eat particles
  eatParticles=eatParticles.filter(p=>p.life>0);
  eatParticles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=.05;
    ctx.globalAlpha=p.life;ctx.shadowBlur=8;ctx.shadowColor=p.color;
    ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.shadowBlur=0;
  });
}

function spawnEatParticles(x,y,color){
  for(let i=0;i<14;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*3+1;
    eatParticles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,r:Math.random()*3+1,color});
  }
}

function updateUI(){
  document.getElementById('score').textContent=score;
  document.getElementById('level').textContent=level;
  if(score>hiScore){hiScore=score;document.getElementById('hi-score').textContent=hiScore;}
}

function updateLenBar(){
  document.getElementById('len-bar').style.width=Math.min(100,snake.body.length*2)+'%';
}

function showLevelFlash(){
  const el=document.getElementById('lvl-flash');
  el.style.animation='none';void el.offsetWidth;
  el.style.animation='flash-anim .6s ease-out';
}

function startGame(){
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('gameover-overlay').classList.add('hidden');
  init();running=true;
  clearInterval(gameLoop);
  gameLoop=setInterval(step,SPEEDS[chosenSpeed]);
}

function endGame(){
  clearInterval(gameLoop);running=false;
  document.getElementById('final-score').textContent=score;
  document.getElementById('go-msg').textContent=
    (score>=hiScore&&score>0)?'🏆 NEW HIGH SCORE! Incredible!':
    score>50?'🎉 Great run! Try again!':'Keep going, you\'ll get better!';
  document.getElementById('gameover-overlay').classList.remove('hidden');
  localStorage.setItem('snakeHi',hiScore);
}

// Controls
document.addEventListener('keydown',e=>{
  if(!running)return;
  if(e.key==='ArrowUp'   ||e.key==='w'||e.key==='W'){if(dir.y!==1) nextDir={x:0,y:-1};}
  if(e.key==='ArrowDown' ||e.key==='s'||e.key==='S'){if(dir.y!==-1)nextDir={x:0,y:1};}
  if(e.key==='ArrowLeft' ||e.key==='a'||e.key==='A'){if(dir.x!==1) nextDir={x:-1,y:0};}
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'){if(dir.x!==-1)nextDir={x:1,y:0};}
  e.preventDefault();
},{passive:false});

document.getElementById('t-up')   .addEventListener('click',()=>{if(dir.y!==1) nextDir={x:0,y:-1};});
document.getElementById('t-down') .addEventListener('click',()=>{if(dir.y!==-1)nextDir={x:0,y:1};});
document.getElementById('t-left') .addEventListener('click',()=>{if(dir.x!==1) nextDir={x:-1,y:0};});
document.getElementById('t-right').addEventListener('click',()=>{if(dir.x!==-1)nextDir={x:1,y:0};});

let ts=null;
canvas.addEventListener('touchstart',e=>{ts={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
canvas.addEventListener('touchend',e=>{
  if(!ts||!running)return;
  const dx=e.changedTouches[0].clientX-ts.x,dy=e.changedTouches[0].clientY-ts.y;
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>20&&dir.x!==-1)nextDir={x:1,y:0};
    else if(dx<-20&&dir.x!==1)nextDir={x:-1,y:0};
  }else{
    if(dy>20&&dir.y!==-1)nextDir={x:0,y:1};
    else if(dy<-20&&dir.y!==1)nextDir={x:0,y:-1};
  }
},{passive:true});

document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('restart-btn').addEventListener('click',startGame);
document.getElementById('menu-btn').addEventListener('click',()=>{
  document.getElementById('gameover-overlay').classList.add('hidden');
  document.getElementById('start-overlay').classList.remove('hidden');
});

document.querySelectorAll('.speed-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');chosenSpeed=btn.dataset.speed;
  });
});

// Init canvas
ctx.fillStyle='#020210';ctx.fillRect(0,0,canvas.width,canvas.height);
</script>
</body>
</html>
